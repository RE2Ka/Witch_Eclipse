- type: entity
  name: Bubblegum
  id: LavalandBossBubblegum
  parent: LavalandMobBase
  description: In what passes for a hierarchy among slaughter demons, this one is king.
  components:
  - type: Physics
    bodyType: KinematicController
  - type: Clickable
  - type: InteractionOutline
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-1,-2,1,1"
        density: 1000
        mask:
        - LargeMobMask
        layer:
        - LargeMobLayer
  - type: NpcFactionMember
    factions:
    - SimpleHostile
  - type: HTN
    rootTask:
      task: SimpleHostileCompound
  - type: Actions
  - type: Sprite
    drawdepth: Mobs
    sprite: _Lavaland/Mobs/Bosses/96x96.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: bubblegum
  - type: MeleeWeapon
    altDisarm: false
    angle: 0
    soundHit:
      path: /Audio/Effects/demon_attack1.ogg
    animation: WeaponArcBite
    damage:
        types:
          Piercing: 15
          Slash: 15
          Blunt: 15
          Structural: 200
  - type: Tag
    tags:
    - CannotSuicide
    - FootstepSound
  - type: CombatMode
  - type: MobState
  - type: MovementSpeedModifier
    baseWalkSpeed: 4
    baseSprintSpeed: 4
  - type: MobThresholds
    thresholds:
      0: Alive
      2500: Dead
  - type: SpawnLootOnDeath
    table: !type:AllSelector
      children:
      - id: LavalandCursedHeart
      - !type:NestedSelector
        tableId: LavalandBossBonusLoot
    deleteOnDeath: true
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Hierophant
  - type: FootstepModifier
    footstepSoundCollection:
      collection: BossImpactFootstep
      params:
        volume: -5
  - type: TileMovement
  - type: Fauna
  - type: Anger
    totalHp: 2500
  - type: MobPhases
    phaseThresholds:
      0: 1
      1000: 2
      2000: 3
  - type: DamageSquareImmunity
  - type: ActionGrant
    actions:
    - ActionBubblegumBloodSpray
    - ActionBubblegumCharge
  - type: MegafaunaAi
    selector: !type:NestedMegafaunaSelector
      id: Bubblegum
  - type: AngerPlayerScaling
    angerScale: 1.1
    hpScale: 1.2
  - type: MegafaunaBlink
    spawnOnTarget: LavalandBossShapeSwoop
    spawnOnUsed: LavalandBossShapeSwoop
  - type: BossMusic
    soundId: Bubblegum
  - type: Aggressive # also required component for aggro checking
    forgiveRange: 20.0
