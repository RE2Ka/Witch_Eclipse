- type: entity
  name: Colossus
  id: LavalandBossColossus
  parent: LavalandMobBase
  description: A monstrous creature protected by heavy shielding.
  components:
  - type: Physics
    bodyType: KinematicController
  - type: Clickable
  - type: InteractionOutline
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-1,-2,1,1"
        density: 1000
        mask:
        - LargeMobMask
        layer:
        - LargeMobLayer
  - type: NpcFactionMember
    factions:
    - SimpleHostile
  - type: HTN
    rootTask:
      task: SimpleRangedHostileCompound
  - type: Actions
  - type: Sprite
    drawdepth: Mobs
    sprite: _Lavaland/Mobs/Bosses/96x96.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: eva
  - type: BatteryAmmoProvider
    proto: LavalandProjectileColossusBolt
    fireCost: 50
  - type: BatterySelfRecharger
    # autoRecharge: true
    autoRechargeRate: 50
  - type: Battery
    maxCharge: 1000
    startingCharge: 1000
  - type: Gun
    projectileSpeed: 20
    fireRate: 0.65
    useKey: false
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot: /Audio/Weapons/plasma_cutter.ogg
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Effects/demon_attack1.ogg
    damage:
      types:
        Blunt: 20
        Slash: 15
        Structural: 150
  - type: Tag
    tags:
    - CannotSuicide
  - type: CombatMode
  - type: MobState
  - type: MovementSpeedModifier
    baseWalkSpeed: 3
    baseSprintSpeed: 3
  - type: MobThresholds
    thresholds:
      0: Alive
      2500: Dead
  - type: SpawnLootOnDeath
    table: !type:AllSelector
      children:
      - id: LavalandVampirismCrystal
      - !type:NestedSelector
        tableId: LavalandBossBonusLoot
    deleteOnDeath: true
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Hierophant
  - type: FootstepModifier
    footstepSoundCollection:
      path: /Audio/_Lavaland/Effects/meteorimpact.ogg
      params:
        volume: 5
  - type: TileMovement
  - type: Fauna
  - type: Anger
    totalHp: 2500
  - type: MobPhases
    phaseThresholds:
      0: 1
      1000: 2
      2000: 3
  - type: DamageSquareImmunity
  - type: ActionGrant
    actions:
    - ActionColossusBlast
    - ActionColossusCardinal
    - ActionColossusDiagonal
    - ActionColossusRing
  - type: MegafaunaAi
    selector: !type:NestedMegafaunaSelector
      id: Colossus
  - type: AngerPlayerScaling
    angerScale: 1.1
    hpScale: 1.2
  - type: BossMusic
    soundId: Colossus
  # - type: CombatPower # Goobstation
  #   factor: 25 # times more dangerous than a crew-member
  - type: Aggressive # also required component for aggro checking
    forgiveRange: 20.0
