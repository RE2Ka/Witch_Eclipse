    icon:
      sprite: _Lavaland/Mobs/legion.rsi
      state: legion-skull
  - type: AngerDelayAction
    minDelay: 1.5
    maxDelay: 4.0
    inverse: true
  - type: WorldTargetAction
    event: !type:SpawnEntityActionEvent
      spawn: MobLegionSkull
      spawnAtUser: true

- type: entity
