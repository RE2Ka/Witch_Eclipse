- type: entity
  id: ActionBaseLavalandMegafauna
  parent: BaseAction
  name: megafauna attack
  abstract: true
  components:
  - type: Action
    priority: -22
    useDelay: 2
    itemIconStyle: NoItem
  - type: TargetAction
    checkCanAccess: false
    range: 35
  - type: WorldTargetAction

- type: entity
  id: ActionAshDrakeFireBreath
  parent: ActionBaseLavalandMegafauna
  name: fire breath
  description: Breathes a burning spread toward the target.
  components:
  - type: Action
    icon:
      sprite: _Lavaland/Objects/Projectiles/megafauna.rsi
      state: drake_fire
  - type: AngerDelayAction
    minDelay: 2.5
    maxDelay: 6.0
    inverse: true
  - type: WorldTargetAction
    event: !type:MegafaunaProjectilePatternActionEvent
      prototype: LavalandProjectileAshDrakeFire
      pattern: TargetedSpread
      count: 3
      spreadDegrees: 42
      speed: 12

- type: entity
  id: ActionAshDrakeSwoop
  parent: ActionBaseLavalandMegafauna
  name: swoop
  description: Swoops onto the target and crushes the landing zone.
  components:
  - type: Action
    icon:
      sprite: _Lavaland/Mobs/Bosses/96x96.rsi
      state: dragon
  - type: AngerDelayAction
    minDelay: 5.0
    maxDelay: 11.0
    inverse: true
  - type: WorldTargetAction
    event: !type:MegafaunaBlinkActionEvent

- type: entity
  id: ActionBubblegumBloodSpray
  parent: ActionBaseLavalandMegafauna
  name: blood spray
  description: Sprays a brutal fan of projectiles.
  components:
  - type: Action
    icon:
      sprite: _Lavaland/Mobs/Bosses/96x96.rsi
      state: bubblegum
  - type: AngerDelayAction
    minDelay: 2.0
    maxDelay: 5.0
    inverse: true
  - type: WorldTargetAction
    event: !type:MegafaunaProjectilePatternActionEvent
      prototype: LavalandProjectileBubblegumBlood
      pattern: TargetedSpread
      count: 5
      spreadDegrees: 50
      speed: 10

- type: entity
  id: ActionBubblegumCharge
  parent: ActionBaseLavalandMegafauna
  name: demonic charge
  description: Charges onto the target through a damaging wake.
  components:
  - type: Action
    icon:
      sprite: _Lavaland/Mobs/Bosses/96x96.rsi
      state: bubblegum
  - type: AngerDelayAction
    minDelay: 4.0
    maxDelay: 9.0
    inverse: true
  - type: WorldTargetAction
    event: !type:MegafaunaBlinkActionEvent

- type: entity
